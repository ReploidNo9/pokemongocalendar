name: Rebuild calendars

on:
  push:
    branches: [main]
    paths:
      - "data/**"
      - "scripts/**"
      - ".github/workflows/rebuild-calendars.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build calendar feeds
        run: python scripts/build.py
      - name: Commit generated feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          git diff --cached --quiet || git commit -m "Update calendar feeds"
          git push
